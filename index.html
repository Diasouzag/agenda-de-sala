<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendário de Eventos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>First Project</h1>
    </header>
    <main>
      <div class="calendar">
        <div class="calendar-title">
          <h2>Agenda de Sala</h2>
          <h2>201</h2>
        </div>
        <div class="header">Horarios</div>
        <div class="header">Segunda</div>
        <div class="header">Terça</div>
        <div class="header">Quarta</div>
        <div class="header">Quinta</div>
        <div class="header">Sexta</div>

        <div class="time">1<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="1"></div>
        <div class="card" data-dia="terca" data-horario="1"></div>
        <div class="card" data-dia="quarta" data-horario="1"></div>
        <div class="card" data-dia="quinta" data-horario="1"></div>
        <div class="card" data-dia="sexta" data-horario="1"></div>

        <div class="time">2<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="2"></div>
        <div class="card" data-dia="terca" data-horario="2"></div>
        <div class="card" data-dia="quarta" data-horario="2"></div>
        <div class="card" data-dia="quinta" data-horario="2"></div>
        <div class="card" data-dia="sexta" data-horario="2"></div>

        <div class="time">3<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="3"></div>
        <div class="card" data-dia="terca" data-horario="3"></div>
        <div class="card" data-dia="quarta" data-horario="3"></div>
        <div class="card" data-dia="quinta" data-horario="3"></div>
        <div class="card" data-dia="sexta" data-horario="3"></div>

        <div class="time">4<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="4"></div>
        <div class="card" data-dia="terca" data-horario="4"></div>
        <div class="card" data-dia="quarta" data-horario="4"></div>
        <div class="card" data-dia="quinta" data-horario="4"></div>
        <div class="card" data-dia="sexta" data-horario="4"></div>

        <div class="time">5<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="5"></div>
        <div class="card" data-dia="terca" data-horario="5"></div>
        <div class="card" data-dia="quarta" data-horario="5"></div>
        <div class="card" data-dia="quinta" data-horario="5"></div>
        <div class="card" data-dia="sexta" data-horario="5"></div>

        <div class="time">6<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="6"></div>
        <div class="card" data-dia="terca" data-horario="6"></div>
        <div class="card" data-dia="quarta" data-horario="6"></div>
        <div class="card" data-dia="quinta" data-horario="6"></div>
        <div class="card" data-dia="sexta" data-horario="6"></div>

        <div class="time">7<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="7"></div>
        <div class="card" data-dia="terca" data-horario="7"></div>
        <div class="card" data-dia="quarta" data-horario="7"></div>
        <div class="card" data-dia="quinta" data-horario="7"></div>
        <div class="card" data-dia="sexta" data-horario="7"></div>

        <div class="time">8<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="8"></div>
        <div class="card" data-dia="terca" data-horario="8"></div>
        <div class="card" data-dia="quarta" data-horario="8"></div>
        <div class="card" data-dia="quinta" data-horario="8"></div>
        <div class="card" data-dia="sexta" data-horario="8"></div>

        <div class="time">9<sup>o</sup></div>
        <div class="card" data-dia="segunda" data-horario="9"></div>
        <div class="card" data-dia="terca" data-horario="9"></div>
        <div class="card" data-dia="quarta" data-horario="9"></div>
        <div class="card" data-dia="quinta" data-horario="9"></div>
        <div class="card" data-dia="sexta" data-horario="9"></div>
      </div>
    </main>
  </body>
</html>
